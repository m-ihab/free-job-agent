name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Syntax gate (all files, floor interpreter)
        # compileall parses EVERY file, including modules pytest never imports,
        # on the matrix's 3.11 leg. Front-line guard against the
        # "3.12-only f-string lands, 3.11 CI never compiles it" failure class.
        run: python -m compileall -q src tests
      - name: Ruff
        run: ruff check src tests
      # Blind-except gate on safety paths (G-8): these two modules are BLE-clean;
      # this blocks a NEW `except Exception` from silently fail-opening the SSRF
      # guard or the request-security check. auto_apply/* burn-down: see WORKLOG.
      - name: Ruff (safety paths — no blind except)
        run: ruff check src/job_agent/ui/security.py src/job_agent/utils/net.py --select BLE
      - name: Mypy
        run: mypy src
      - name: Tests
        # --reruns retries only failed tests (no cost on green); this absorbs
        # transient flakes in the threaded live-server tests on shared runners
        # without masking real failures (those fail every retry).
        # mkdir first: pytest does not create basetemp's PARENT directory, and
        # a fresh checkout has no .pytest_tmp/ — without this every test errors
        # at fixture setup with FileNotFoundError.
        run: |
          mkdir -p .pytest_tmp
          pytest -q --basetemp=.pytest_tmp/bt --reruns 2 --reruns-delay 1

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (dev + e2e extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,e2e]"
      - name: Cache Playwright browsers
        # Kills chromium-download flakes and speeds the e2e job. Keyed on
        # pyproject so a playwright version bump busts the cache automatically.
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: E2E tests
        # mkdir first — see the Tests step note about basetemp's parent dir.
        run: |
          mkdir -p .pytest_tmp
          pytest tests/e2e/ -q --basetemp=.pytest_tmp/e2e

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dev deps
        run: npm install --no-audit --no-fund
      - name: Stylelint (dashboard CSS)
        run: npm run lint:css
      - name: ESLint (dashboard JS)
        run: npm run lint:js

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit (high severity only)
        # --severity-level high matches this step's intent. (-ll meant
        # MEDIUM-and-up, which flags pre-existing false positives such as
        # parameterized SQL built with f-strings and stdlib XML parsing.)
        run: bandit -r src --severity-level high
      - name: pip-audit
        run: pip-audit -r requirements.lock
      - name: Lock freshness (warn on drift, never fail)
        # requirements.lock is the pip-audit target; if it silently diverges from
        # pyproject the audit scans stale deps. This surfaces drift as a warning
        # (regeneration is deliberate and happens on the 3.11 floor).
        run: |
          pip install pip-tools
          pip-compile pyproject.toml --all-extras -o /tmp/fresh.lock -q 2>/dev/null || true
          diff -u requirements.lock /tmp/fresh.lock || echo "::warning::requirements.lock drift — regenerate on py3.11 (pip-compile pyproject.toml --all-extras -o requirements.lock)"
