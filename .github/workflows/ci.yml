name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src
      - name: Tests
        # --reruns retries only failed tests (no cost on green); this absorbs
        # transient flakes in the threaded live-server tests on shared runners
        # without masking real failures (those fail every retry).
        # mkdir first: pytest does not create basetemp's PARENT directory, and
        # a fresh checkout has no .pytest_tmp/ — without this every test errors
        # at fixture setup with FileNotFoundError.
        run: |
          mkdir -p .pytest_tmp
          pytest -q --basetemp=.pytest_tmp/bt --reruns 2 --reruns-delay 1

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (dev + e2e extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,e2e]"
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: E2E tests
        # mkdir first — see the Tests step note about basetemp's parent dir.
        run: |
          mkdir -p .pytest_tmp
          pytest tests/e2e/ -q --basetemp=.pytest_tmp/e2e

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dev deps
        run: npm install --no-audit --no-fund
      - name: Stylelint (dashboard CSS)
        run: npm run lint:css
      - name: ESLint (dashboard JS)
        run: npm run lint:js

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit (high severity only)
        # --severity-level high matches this step's intent. (-ll meant
        # MEDIUM-and-up, which flags pre-existing false positives such as
        # parameterized SQL built with f-strings and stdlib XML parsing.)
        run: bandit -r src --severity-level high
      - name: pip-audit
        run: pip-audit -r requirements.lock
